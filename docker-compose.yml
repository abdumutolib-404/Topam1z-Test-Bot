# ════════════════════════════════════════════════════════════════════════
#  @topam1z_bot — Google Cloud VM
#  Stack: Telegram Local Bot API + Bot
#  Database: Neon (external PostgreSQL)
# ════════════════════════════════════════════════════════════════════════

services:

  # ── Telegram Local Bot API Server ───────────────────────────────────
  tg-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
      - TELEGRAM_VERBOSITY=1
    volumes:
      - tg_api_data:/var/lib/telegram-bot-api
    networks:
      - botnet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ 2>&1 | grep -q '404 Not Found' && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── @topam1z_bot ─────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      tg-api:
        condition: service_healthy
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - ADMIN_PASS=${ADMIN_PASS}
      - DATABASE_URL=${DATABASE_URL}
      - LOCAL_API_URL=http://tg-api:8081
      - SHAZAM_KEY=${SHAZAM_KEY:-}
      - BOT_TMPDIR=/tmp/bot_tmp
    volumes:
      - bot_tmp:/tmp/bot_tmp
      - ./cookies.txt:/app/cookies.txt
      - ./www.youtube.com_cookies.txt:/app/www.youtube.com_cookies.txt
      - ./www.instagram.com_cookies.txt:/app/www.instagram.com_cookies.txt
    networks:
      - botnet

volumes:
  tg_api_data:
  bot_tmp:

networks:
  botnet:
    driver: bridge
