# ════════════════════════════════════════════════════════════════════════
#  @topam1z_bot — Google Cloud VM
#  Stack: Telegram Local API + Bot
#  Database: Neon (external, free serverless PostgreSQL)
#
#  Usage:
#    cp .env.example .env && nano .env
#    docker compose up -d
#    docker compose logs -f bot
# ════════════════════════════════════════════════════════════════════════

services:

  # ── Telegram Local Bot API Server ───────────────────────────────────
  # Raises upload limit 50 MB → 2 GB
  # Binds to internal network only
  tg-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID:    ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH:  ${TELEGRAM_API_HASH}
    command: >
      --api-id=${TELEGRAM_API_ID}
      --api-hash=${TELEGRAM_API_HASH}
      --http-port=8081
      --local
      --dir=/var/lib/telegram-bot-api
      --log=/dev/stdout
      --verbosity=1
    volumes:
      - tg_api_data:/var/lib/telegram-bot-api
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── @topam1z_bot ─────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      tg-api:
        condition: service_healthy
    environment:
      BOT_TOKEN:        ${BOT_TOKEN}
      ADMIN_IDS:        ${ADMIN_IDS}
      ADMIN_PASS:       ${ADMIN_PASS}
      DATABASE_URL:     ${DATABASE_URL}        # Neon connection string
      LOCAL_API_URL:    http://tg-api:8081     # points to local API container
      SHAZAM_KEY:       ${SHAZAM_KEY:-}
      # Cookies loaded from file — see volumes below
      BOT_TMPDIR:       /tmp/bot_tmp
    volumes:
      - bot_tmp:/tmp/bot_tmp          # temp video storage on VM disk
      - ./cookies.txt:/app/cookies.txt:ro  # Netscape cookies — read-only
    networks:
      - botnet

volumes:
  tg_api_data:   # Telegram Local API session data
  bot_tmp:       # Temp downloads — deleted after sending

networks:
  botnet:
    driver: bridge
